spec_version: 1
name: dataprivacy-env
version: 1.0.0
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  ComplianceGuard — 3-phase PII Redaction RL Environment.
  Agent learns SCAN → CLASSIFY → REDACT workflow across 4 curriculum levels.
  Real enterprise GDPR/HIPAA compliance task with adaptive difficulty.
tags:
  - openenv
  - privacy
  - gdpr
  - pii
  - compliance
  - reinforcement-learning
tasks:
  - id: level_1
    difficulty: easy
    description: Single server log, 3 PII items (name, email, phone). Clear text.
    max_reward: 0.999
  - id: level_2
    difficulty: medium
    description: Two text files (server_logs.txt + incident_report.txt), 9 PII items (3 names, 3 emails, 3 phones).
    max_reward: 0.999
  - id: level_3
    difficulty: hard
    description: Three files, 9 PII items in obfuscated forms (john [at] email [dot] com, phone dash formats).
    max_reward: 0.999
  - id: level_4
    difficulty: expert
    description: Three files, 9 PII items plus red herrings (test@example.com). Must classify precisely.
    max_reward: 0.999
